{% extends "base.html" %}
{% block title %}{{ action }} Product — E-Billing{% endblock %}
{% block content %}
<div class="page-header">
  <div><div class="page-title">{{ action }} Product</div></div>
  <a href="/products" class="btn btn-outline">← Back</a>
</div>
<div class="card" style="max-width:700px">
  <form method="POST" action="{{ '/products/edit/'+product.id|string if product else '/products/add' }}">
    <div class="form-grid">
      <div class="form-group full">
        <label>Product / Service Name *</label>
        <input name="name" value="{{ product.name if product else '' }}" required placeholder="e.g. Web Development, Logo Design"/>
      </div>
      <div class="form-group full">
        <label>Description</label>
        <textarea name="description" placeholder="Brief description...">{{ product.description if product else '' }}</textarea>
      </div>
      <div class="form-group">
        <label>Category</label>
        <input name="category" value="{{ product.category if product else '' }}" placeholder="Services, Products, etc."/>
      </div>
      <div class="form-group">
        <label>Type</label>
        <select name="is_service">
          <option value="1" {% if product and product.is_service %}selected{% endif %}>Service</option>
          <option value="0" {% if product and not product.is_service %}selected{% endif %}>Product (Goods)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Unit Price ({{ cfg.currency_symbol if cfg else '₹' }}) *</label>
        <input name="unit_price" type="number" step="0.01" min="0" value="{{ product.unit_price if product else '' }}" required/>
      </div>
      <div class="form-group">
        <label>Unit</label>
        <input name="unit" value="{{ product.unit if product else 'unit' }}" placeholder="unit, hr, kg, project..."/>
      </div>
      <div class="form-group">
        <label>Tax Rate % (GST)</label>
        <input name="tax_rate" type="number" step="0.01" min="0" max="100" value="{{ product.tax_rate if product else 18 }}"/>
      </div>
      <div class="form-group">
        <label>HSN / SAC Code</label>
        <input name="hsn_sac_code" value="{{ product.hsn_sac_code if product else '' }}" placeholder="e.g. 998314"/>
      </div>
    </div>
    <div style="margin-top:20px;display:flex;gap:12px">
      <button type="submit" class="btn btn-primary">{{ action }} Product</button>
      <a href="/products" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
