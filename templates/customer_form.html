{% extends "base.html" %}
{% block title %}{{ 'Edit' if customer else 'Add' }} Customer — E-Billing{% endblock %}
{% block content %}
<div class="page-header">
  <div><div class="page-title">{{ 'Edit' if customer else 'Add' }} Customer</div></div>
  <a href="/customers" class="btn btn-outline">← Back</a>
</div>
<div class="card" style="max-width:700px">
  <form method="POST" action="{{ '/customers/edit/'+customer.id|string if customer else '/customers/add' }}">
    <div class="form-grid">
      <div class="form-group full">
        <label>Full Name *</label>
        <input name="name" value="{{ customer.name if customer else '' }}" required/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input name="email" type="email" value="{{ customer.email if customer else '' }}"/>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input name="phone" value="{{ customer.phone if customer else '' }}"/>
      </div>
      <div class="form-group full">
        <label>Address</label>
        <input name="address" value="{{ customer.address if customer else '' }}"/>
      </div>
      <div class="form-group">
        <label>City</label>
        <input name="city" value="{{ customer.city if customer else '' }}"/>
      </div>
      <div class="form-group">
        <label>State</label>
        <input name="state" value="{{ customer.state if customer else '' }}"/>
      </div>
      <div class="form-group">
        <label>Pincode</label>
        <input name="pincode" value="{{ customer.pincode if customer else '' }}"/>
      </div>
      <div class="form-group">
        <label>GSTIN (optional)</label>
        <input name="gstin" value="{{ customer.gstin if customer else '' }}" placeholder="29AABCU9603R1ZX"/>
      </div>
    </div>
    <div style="margin-top:20px;display:flex;gap:12px">
      <button type="submit" class="btn btn-primary">{{ 'Update' if customer else 'Add' }} Customer</button>
      <a href="/customers" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
